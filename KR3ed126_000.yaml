  text: 一首篇西山真仙衛生歌天地之間人為貴頭象天兮足象地父母遺體宜寶之箕疇五福壽為最衛生切要知三戒大怒大欲並大醉三者之中有一焉須防損失真元氣欲求長生先戒性火不出兮神自定木若去火不成灰人能戒性還延命貪欲無窮忘卻精用心不住定無神勞神散盡中和氣更仗何能保此身心若太費費則竭形若太勞勞則歇神若太傷傷則虛氣若太損損則絕世人慾識衛生道喜樂有常嗔怒少心誠意正思慮除順理修身去煩惱春噓明目夏呵心秋呬冬吹肺腎寧四季常呼脾化食三焦嘻卻熱難停發宜多梳氣宜煉齒宜頻叩津宜咽子欲不死修崑崙兩手揩摩常在面春月少酸宜食甘冬月宜苦不食鹹夏月增辛聊減苦秋辛可省但加酸季月少鹹甘略戒自然五臟保平安若能全減身康健滋味偏多無病難春寒莫放棉衣薄夏月汗多宜換著秋冬身冷漸加添莫待病生來服藥惟有夏月難調理內有伏陰忌冰水瓜桃生冷宜少餐免得秋來成雪痢心旺腎衰切須記君子之人守齋戒常令充實勿空虛日食須當去油膩太飽傷神飢傷胃大渴傷血多傷氣飢餐渴飲莫太過免致膨脝損心肺醉後強飲飽強食未有此身不生疾人資飲食以養生去其甚者將安適食後徐行百步多手摩心腹食消磨夜半靈根灌清水丹田濁氣切須呵生膾偏招脾胃疾鮓醬胎卵兼油膩陳臭醃臘盡陰類老衰莫欲更食之自藉寇兵無以異炙煿之物須冷吃不然損齒傷血脈晚食常宜申酉前向夜徒勞滯胸膈飲酒莫教令大醉大醉傷神損心志渴來飲水兼吃冷腰腳自茲成重墜常聞避風如避箭坐臥須當預防患況因食後毛孔開風才一入成癱瘓不問四時俱暖酒太熱又須難向口五味偏多不益人恐隨臟腑成殃咎視聽行坐不必久五勞七傷從此有四肢亦欲得少勞譬如戶樞終不朽臥不厭踧覺貴舒飽則浴兮飢則梳梳多浴少益心目默寢暗眠神晏如四時惟夏難將攝伏陰在內腹冷滑補腎湯藥不可無食物稍冷休哺啜心旺腎衰何所忌特忌疏通泄精氣寢處須宜密室間晏居靜慮積心意沐浴盥漱皆暖水臥冷枕冷俱勿喜瓜茹生冷不宜人豈獨秋來多雪痢伏陰在內冬三月切忌汗多陽氣泄陰霧之中少遠行暴雷驟雨宜速避道家更有頤生旨第一令人少嗔怒秋冬日出始離床春夏雞鳴宜早起子後寅前睡覺來瞑目叩齒三十六吸新吐過兩三口咽漱玉泉須養胎熱摩手心熨兩眼仍須揩擦額與面中指時將摩頸鼻左右耳輪筌數遍更能幹浴遍身間按髀時須扭兩肩總有虛勞諸冷氣何憂腰背復拘攣噓呵呼嘻吹及呬行氣之人系六字果能依用口訣中新舊有疾皆可治睹雖云屬少年稍知樽節乃無愆閒情息氣宜聞早莫使羽苞火內燃有能操履長方正名卻無貪利無競縱向歌中未盡行百行周身亦無病衛生歌終後衛生訣飲酒可以陶性情太飲過多防有病肺為華蓋恐受傷咳嗽勞神多損命甚勿將鹽去點茶分明引賊入其家下焦虛冷令人瘦傷腎傷脾防病臨坐臥切防風入腦腦內入風人不壽更兼醉飽臥風中風才一人成災咎雁有序兮犬有義黑鯉朝北知臣禮人無仁義反食之天地神明俱不喜況云牢字從牛起更兼獄字從犬禮勸人莫食牛與犬一世瘟疫總不染三代不食犬與牛子孫榮貴做公侯此言莫道虛誑語皆載口言書上頭養體須當節五辛五辛不節食傷神莫教引動虛陽發精竭神枯疾病縈不問在家並在外若遇迅雷風雨至急宜端肅敬天威靜室處心宜敬避恩愛牽綿不自由利名縈絆幾時休放寬些鬚子孫福免得中年早白頭頂天立地非容易飽食暖衣皆可喜思量無以報洪恩朝夕焚香謝天地身安壽永意如何胸內平和積善多惜命惜身兼惜氣請君熟玩衛生歌養生卻病歌世言服靈丸餌仙藥白日而輕舉者但聞而未見也至於養氣之言可以養元之道人稟氣血而生攝生論云攝生之要必去其害生者此言明也予所編養生卻病歌採諸家養生之要而為言人能依而行之則獲安樂若盡其訣亦長年之可覬今錄其歌於後又曰萬物惟人為最貴百歲光陰如寄旅是非留意修養中未免疾病為心累何必飡霞餌丹藥妄意延齡等龜鶴但在飲食節欲間去其甚者得安樂食後徐徐行百步兩手摩脅並摩腹須臾轉手摩腎堂謂之運動水與土仰面仍呵三四呵自然食積得消磨醉後飽臥皆無益渴飲飢餐猶戒多食不欲多兼欲速乍可少餐相接續自死之牲皆勿食饅頭閒不相和三坎離種子神方敘余少娶既壯而熊黑之祥不協稽諸古方曾服世傳南嶽魏夫人濟陰丹續嗣陰生丹紫石英丸秦桂丸等劑俱勿獲效因閱丹經子書究陰陽交媾之道窮生身受氣之初成人成仙之道先天后天之分乃知大道之在斯也遂悟古方因病而說效於彼者必不效於此苟不明陰陽化育之機徒藉服藥以求嗣猶緣木而求魚也於是遍歷江湖幸而遇上人方師父憐余多病身弱以致求嗣之塞教以攝生保身之道袖出方書一帙受余戒曰是書乃雷公岐伯指示內外交養之機中摘出坎離種子神方一卷百投百中宜敬秘之勿妄傳於無德余拜受詳玩之乃知斯書深明二五妙合生育之道按卦五方推移投疾之法大臻妙理非執方膠柱之比誠有功於斯世依制服之家室一時而孕竟一男一女產焉越四載複製前藥服之驗如其初余藥饋親友試之俱各得嗣後遊金陵將此方見授於縉紳士庶悉獲其效久知是方百發百中而神化之道不可誣也竊見世人無子往往信服金石房中之藥不惟不效抑且增致他疾噬臍莫及心實憫之昔蘧伯王惡獨為君子有善而不共諸人豈有道者哉敢不自諱遂將此方逐一致誠較正錄梓與天下求嗣者共之以布陰騭保我子嗣克昌然濟人利物之心又孰有加於此哉夫好善樂成孰無此心行之而不樂未必得以成樂之而時未至亦未必竟以成也余昔好奇術凡陰陽醫卜之書靡不究覽遇有奇術切於人道者輒錄以藏之彼種子神方舊在余所常舉以濟他人悉有效應甚珍而欲刊久矣因不得其詳而止是所為樂之而未得時者也今以薄宦都下見小川王先生之本奇書乃得以詳玩先師注述之意首尾條貫一覽瞭然誠藏書也嗣續乃人倫之大不得自私余乃請諸先生願捐資翻刻以傳於世是所謂得其成樂其成庶不負好善之初心也得是書者也他日子嗣森森豈可忘此書之功及用心之意哉遂書以錄之論陰陽生育之道二五之精妙合而凝人乃生焉蓋陰陽生五行五行翊陰陽以生人也人得父母之精血以成形精血生五臟五臟復滋精血而生子焉父母之精血先天之氣也五臟之精粹後天之氣也人之飲食入胃其精氣之上濡脾肺以及心肝腎潛滋暗長以翊先天此先天后天之間成人成仙之機也其玄言妙道未敢輕泄但於實理易見者求之則曰取將坎中實來填離中虛玄理妙訣盡在斯矣詳見成男成女論內辨脈種子法男女者陰陽也夫婦者剛柔也陰陽成象剛柔成質人稟天地以生有男女則有夫婦之道焉有陰陽則有剛柔之義陽剛而陰柔故天覆而地載是故生育之理以女子為受孕之本男子運生化之源易大過卦九二爻詞曰枯楊生梯老夫得其女妻老陽遇少陰有子之道故夫雖老而得女妻猶能成生育之功也故當先調女子經脈以為受孕之本脈經曰若問女子何因尺中不絕胎脈方真內經云陰搏陽別謂之有子大抵女子先宜無病而經脈調和方能有子且如六脈四至平和不沉不浮不洪不弱而兩尺往來流利滑實不絕雖不藥而自孕或有太過皆當依法調理經曰左太陽脈沉實為男右太陰脈沉大為女又曰孕婦行履時左足先行為男右足先行為女左陽右陰剛柔之義也必先辨明此理而後可以入妙道若夫男子運生化之源者不調燮下元虧損則亦不能運化其義詳見後調元論云謹按詩小雅云維熊維羆男子之祥陽物在山剛也維虺維蛇女子之祥陰物穴處柔也人之動靜夢寐精神感召與天地陰陽相與流通而況於男女剛柔之實理乎先天歸一湯又名啟扁湯人參八錢臺術一兩麩炒茯苓一兩國老四錢川歸一兩二錢酒浸腦芎一兩白芍八錢生地一兩酒洗砂仁七錢微炒莎草根七錢廣皮六錢丹皮七錢去骨半夏七錢湯泡川牛膝八錢酒洗上十四味共作十劑水二鍾姜三片煎八分空心服渣再煎用水一鍾半煎七分臨臥服經未行前服五劑行後服五劑服完十劑後即服丸藥如無他病只照本方服之如有他疾宜照後加減服之經調脈和自然得孕加減法婦人子宮久冷不孕加乾薑肉桂各五分何以知其冷丈夫交合之時當自覺之如冷甚灸丹田七壯極效在肚臍下三寸婦人子宮太熱則傷胎加黃柏知母各六分何以知其熱亦丈夫當自覺也白帶白濁白淫時下俗云下寒非寒也乃是婦人素虛濁氣下陷故也有痰者亦然當加白芷一兩升麻五錢或倍加半夏如不能服藥灸中極七壯極效在臍下四寸氣不流通者加木香三分平素虛勞自汗或惡寒加黃耆肉桂咳嗽加阿膠貝母各四錢勞熱血枯加柴胡鱉甲勞甚腰背疼者灸膏肓二穴各七壯在背脊四椎下近五椎兩旁各開三寸明堂云生無所不療令人有子甚效飲食減少倍白朮陳皮加厚朴神麯各五錢肥白人痰盛迷塞子宮加南星三稜各六錢經水將行小腹作疼者有瘀血也加桃仁紅花各四錢蓬朮五錢玄胡索四錢如未效去人參加五靈脂六錢半炒半生用乳香三錢腰腿痠疼者加杜仲一兩二錢羌活三錢桃仁四錢經水行後作疼者虛也加熟地黃六錢當歸八錢五味三錢脅腹有痞塊者去牛膝加三稜莪朮各六錢桃仁枳實各五錢前五劑加檳榔五錢後五劑不可加腹有鬼胎者狀如懷胎非真胎因氣裹精而結無血也宜用桃仁乾漆肉桂麝香水銀之類丸服以去之然後再用歸一湯以俟經調仍然得胎經水前期而至者加黃芩五錢炒真蒲黃五錢經水過期而至者加乾薑五錢丹皮五錢紅花三錢經水枯閉者只依本方連服至二十劑即有效經水崩漏不止者加蓮蓬殼灰五錢白芷八錢豬頭骨灰六錢熟艾三錢黃芩五錢平日有風氣寒濕疼痛者加秦艽三錢羌活七錢乳香沒藥各五錢或加蒼朮有熱疼痛加黃柏心腹膨脹者加大腹皮三錢木香三錢檳榔五錢小便澀小不通者加豬苓澤瀉亦不宜多用恐泄腎氣室女經脈滯澀不通者謂之衝任不調也前方內加劉寄奴六錢不應者加衛茅三錢神效已上本方先聖按卦推移製造不宜任意加減只可隨症依此加減之法用之其效如桴應鼓如神後天物化丸服前湯藥已盡經脈已調自然妊娠倘有未應即宜此丸藥依法不差大臻實效此丸男女同服鹿茸三錢酥炙蛇床子四錢微炒熟地一兩肉蓯蓉五錢酒蒸搗膏肉桂三錢牛膝六錢半夏六錢人參五錢砂仁六錢川柏一兩童便浸炒秦艽八錢川楝八錢杜仲一兩薑製白芷八錢上十四味擇壬子日如法制過搗羅細末煉蜜丸如桐子大每服四十八丸空心淡醋湯下或酒下亦可覺有孕遂止男服用酒或鹽湯下男亦可以常服服久更好男子服藥調元論女子有病經脈不調不孕者最多男子亦有少年元精不固亦有老年元陽虛憊者不宜用湯藥只可服後天物化丸則效此藥大固元陽有生生化化之功也如男子素強壯者不必服之男年三四十歲娶妻妾三五房從不見孕者乃稟受元氣虛弱元氣虛則元精淡元精淡則元神疲元神疲則不能施化雖則交合則陽精不能沖射陰血而凝結也如此之輩則妻妾不須服藥但男子自己服此藥然後依法調治餘存口訣見後成男成女論內猶切忌不明正道信服金石房中之藥致生他疾戒之慎之又方男若虛甚者用海狗腎謹按已上湯丸等劑俱預製下男女依法各服候頭一月經行淨後交合不孕至次月又如前月女服湯藥十劑更如法服丸料待經行後交合准孕准孕決不出六十四日之外也親試甚驗及與人調治無不驗者此可見先聖立法之妙而又可敷受之驗也先天歸一湯論昔太乙雷公天師岐伯制方之始察陰陽按八卦原太初太始而立方以人身之血氣即天地之有陰陽也故制四君子湯以養氣乾道也制四物湯以養血坤道也合四物四君子名八珍湯象乾坤之生六子八卦全也是以先天歸一湯以乾坤為父母以六卦為子女以四物四君為君而以六味臣藥佐之此先聖作法參天地闔闢之機也乾坤大父母圖說太陽乾父震長男坎次男艮少男乾三陽太陰坤母巽長女離中女兌少女謹按孕元立本日有太初有太始渾淪既判既見氣矣故曰太初既立形矣故曰太始氣初形始天地相因生生化化品物彰矣故曰大哉乾元萬物資生乾坤大父母者乾坤以太陽太陰相合而生六子也後天物化丸論天地生物之始乾坤為父母氣化也故曰先天男女生子之始坎離為父母物化也故曰後天是以先聖制後天物化丸以鹿茸杜仲牛膝人參滋腎以升坎水也蛇床子地黃黃柏攝心以降離火也坎離復生六卦為六子故復以六味之藥以佐坎離為六子水火升降陽施陰化物各付物有子之道亦猶氣化而然此先聖立法贊天地化工之神妙也坎離小父母圖少陽坎父巽二陰艮二陰坤三陰少陰離母震一陽兌二陽乾三陽謹按擬形殊稟曰天地者形之大也陰陽者氣之大也惟形與氣相資而立未始偏廢男女媾精萬物化生天地陰陽之形氣寓焉語七八之數七少陽也八少陰也相感而流通故女子二七而天癸至男子二八而精至乃順陰陽交合而兆始也語九十之數九老陽也十老陰也相包而賦形故陰窮於十男能圓之陽窮於九女能方之是以陰陽相生而成物故也坎離小父母者坎離以少陽少陰相合而生六子也成男成女論夫夫婦形氣於天地坎離中媾於乾坤何以不能育耶蓋由男女有疾氣血偏勝子偏不啟或啟之非道媾之不時治之無法則終身不孕孕之不育育之不壽壽之不福也其義云何蓋坎為少陽坎中滿男子要實也故男子預服物化丸攝心以滋腎寡欲以養精伏氣以凝神無中生有必候蓄積盛而後交也離為少陰離中虛女子要空也故女須預服歸一湯隨月魄以生血按地潮以通經法先天推陳以致新所以候經淨而後合也經云取將坎中實來填離中虛誠妙道也如此則生子堅固而多福餘存口訣脈經云陰血先至陽精後沖血開裹精精入為骨是離變而乾也而男形斯成陽精先至陰血後參精開裹血血入居本是坎變而為坤也而女形斯成或云有轉女為男之法此乃世俗妄語誰有此理後天未布漠然太虛而先天以主之矣且夫元氣孕育皆始於子自子推之男左旋積歲三十而至已女右旋積歲二十而至已已為正陽陰實從之自已懷胎男左旋十月而生於寅女右旋十月而生於申申為三陰寅為三陽而生育之道先天已著定矣其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰福有厚薄壽有短長皆一定而不易也豈有轉女為男之理哉觀乾坤坎離中爻交媾之圖蓋可見矣乾坤坎離中爻交媾之圖先天氣化乾坤之中爻交則乾為離而坤為坎矣後天形化坎離之中爻交則離為乾而坎為坤矣灸男婦無子穴法有等貧難之家無力服藥者宜擇壬癸日或益後續世天喜並臨之日將男婦審看有何病患以致不嗣之由各依法灸之無有不效者予嘗親灸數十人效如轉轂此實施布陰騭之端也謹書至當累驗穴法於後一丹田穴在臍下三寸乃足少陰任脈之會灸之能益精血除百病扶陽助陰令人有子按明堂諸針灸經云此穴補諸羸強陽道壯筋骨去寒熱治男子勞傷遺精白濁女子赤白帶經血枯閉崩中漏下等病以致無子灸之甚效難經疏云丹田在臍下三寸方圍四寸左青右白上黃下黑三寸法三光四寸法四時五色法五行取人身之上下四向最為中也丹經云窮取生身受氣初也應在此穴也宜灸七壯或十四壯須頻頻累灸而且多多益善二中極穴在臍下四寸主婦人斷緒針即有然灸不及針妙予亦嘗灸數婦隨手應驗自知灸與針功無優劣也三膏肓一穴在脊骨四柱下近五柱兩旁各開三寸主虛損羸瘦男子失精女子失血骨蒸勞熱咳嗽健忘以致乏嗣灸此百病俱愈即能有子四三里穴在膝眼犢鼻下三寸䯒骨外天筋內宜舉足取之治五勞七傷脾胃冷積食氣水氣蠱毒疽癖浮腫腿膝痠疼眼目昏暗腰背疼痛積血枯竭以致乏子針灸甚效五臍下二寸名石門穴不宜針灸令人不孕忌之忌之奉天求嗣論謹按諸書求嗣之論曰人稟天地父母之氣以生求子繼嗣者即所以奉天孝親也厥系非輕其可忽諸既得是先聖秘書必當珍重敬心依方調治致誠服藥臨期可得賢嗣又必修行積善以保無窮凡修合必擇壬子日與益後續世天喜諸吉星並臨之日者蓋謂趨吉避凶重其事而不敢忽也或謂有雙日有單日夜半前後分男女之說亦妄也但擇旺相日如春甲乙寅卯夏丙丁己午秋庚辛申酉冬壬癸子亥四季戊己丑未之日務必要夜半子醜寅生氣之時交合必使陽精衝開陰血則必生男且能賢明而福壽也又曰月望以前受男孕者吉月望以後受女孕者吉切忌晦朔弦望風雨雷電日月無光虹霓開動星月之下神廟之中井灶屍樞之旁切不可交合受胎亦不吉也又按要書云年命相剋墳墓相妨夫婦有疾三者不嗣且夫婦有疾不產理固然矣故先聖首制此方並法以濟世人所以卻疾病養精血法乾坤坎離之道而有子若云年命墳墓豈有道者之談哉人惟修德行仁則天命在我惟不能積德存仁於是委罪於年命墳墓而已也凡我奉天孝親之人豈可委罪於年命墳墓哉顧德行如何耳保胎五訣一男子強壯婦人無病豈有乏嗣之理皆有不能調攝血氣精神有虧所以欲孕而不孕成而不堅育而不壽徒廢精神蹉跎歲月老而乏嗣悔將何及求嗣之人當洗心滌慮致謹以求之免後噬臍之悔方信余之言不誣也一女子服藥月水既調諸症皆無是然育也宜當節飲食慎起居戒暴怒懲色欲以候經行淨後以時交合決然有子凡經行後切不可用水洗下身此乃金蓮種子之法也一男子服藥筋骨舒暢陽強精固是當嗣也務宜節欲以養精息慮以養神守逸以堅氣候女經行淨後擇吉日生炁時交合留意含情自臻妙道一凡交合兩美陰血陽精並瀉入子宮如銀爐之點鉛豆漿之點滷溶夕而化凝結而成未有不胚胎者矣當斯際也精血初凝竊母氣以成形亦尤播種於地待雨露而發集卵於窩待抱而變責任在母宜謹慎之保至月餘經水朝宮以癊胎不致外溢胎始安矣若不謹慎使經妄行則胎隨出矣故曰慎在首月然則十月之中俱宜小心猶為切要也一經行淨後神怡氣爽兩儀配合未有不結胎者矣然有結而不成者有數說也不可不明有或男精寒薄而不結者有或母氣血虛弱而不成者有或子宮太熱結而不成者有或飲食不節而毒犯胎元者有或喜怒無常而沖激胎元者有或淫欲太過而泄漏胎元者有或勉強用力而勞動胎元者有或風邪時疾而振慄胎元者有或濕熱外淫而熏蒸胎元者或對月或不對月胎元既傷不能竊母血以成形則母氣血無所施癊氾濫而漫盈而經血妄行胎隨經下止有小塊未有粗形人皆不覺是胎即曰不曾有胎孕而經復行也殊不知月月懷胎終不能成人自不察耳亦有播種抱卵一暴十寒可能成乎且夫月月懷胎之理人所不知猶月受日光月月如此惟有達天德者洞究火符之進退寒暑之代謝四時萬物之生育無時不然噫防危慮險之際非明物察理之士其孰能知之耶謹按上五訣皆因前人所研未發是以後人不能守也今以發明矣聞斯言也宜當謹慎以全後嗣以成奉孝親之人也謹按是書發泄已盡所在神明護持所以先聖秘而不傳也今得此書者最宜珍重非特承祧而已推而廣之觸而長之洞達璇璣之妙則仙關易透入聖不難未敢輕議也謹按受胎之說服藥調理之法生子之道隨時保嬰之妙皆考前方奉太乙天師指示坎離種子神方畢附集延齡種子方當歸身川牛膝淮生地熟地片芩各四兩酒浸天門冬去心淨四兩米泔水浸山萸肉四兩遼五味子川芎山藥各二兩黃柏去皮淨九兩鹽酒蜜水各浸三兩新龜板酥炙去邊淨二兩人參六錢知母四兩鹽水酒各浸二兩上藥各制如法忌用鐵器為細末用白蜜三斤不宜火煉將竹筒一節開一圓孔去皮入蜜在內綿紙封固七層豎立鍋中柴火煮一晝夜和藥數千杵丸如桐子大每服百丸清晨鹽湯晚用好酒送下男婦同服以服藥之日為始忌房事一月愈久愈妙其效如神保產無憂方又名安胎飲此方蘇州府尊陳諱鵬年傳白芍一錢二分酒炒冬月用一錢四分黃耆八分蜜炙川芎一錢五分菟絲子一錢四分川貝一錢去心當歸一錢二分酒洗厚朴八分薑汁炒荊芥穗八分枳殼六分麩炒甘草五分羌活五分真蘄艾六分上藥用水二飯碗煎至八分加姜三片同煎如遇內熱者加姜一大片煎服不拘時服臨產之月預服五六劑隨常四五六七月前稀服亦妙再無難產之艱馬料豆仙方此方亦陳府尊所傳專治烏髮黑髮去勞傷補筋骨明目補腎水生血養元亦可廣嗣四十歲前後服此大妙懷生地酒煮何首烏酒煮鹿銜草旱蓮子各三兩懷山藥乳拌全當歸酒炒白茯苓乳拌真青鹽各一兩厚杜仲酒炒斷絲長牛膝石菖蒲補骨脂覆盆子菟絲子骨碎補金櫻子刮去皮刺白乾菊槐角子蛇床子枸杞子黃柏肉蓯蓉澤瀉五加皮各五錢上藥宜揀藥料共二十四味將青鹽存外用俱入大砂鍋內用陰陽水各半同煎至頭二次濾去藥渣再將女貞子一升八合半復入藥汁內同煎百十滾又瀝去女貞子用馬料豆三升七合豆宜揀淨入藥汁內浸一宿明晨將豆藥汁入銅鍋煮熟收干汁盡為度放於篩中將青鹽研細摻在豆上拌勻曬乾入磁瓶內每日清晨服四錢滾水送下
