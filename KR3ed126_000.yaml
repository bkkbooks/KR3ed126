  text: 二廣嗣要語本序溯洄子俞橋序曰陰陽之道順則生乾逆則生坤擴而充之天機之秘盡予早歲得遇異人授以大道三十年間歲月如流而盟詮未證夫順修乾上而坤下以有形交無形女子懷胎者人道也逆修地上而天下以無質交無質順而有形者後天太極之氣也逆而無質者先天太始之氣也蓋順則有盡逆則無窮有形則有壞無質則無敗是以至人退陰進陽斥有從無舍河江汗漫之未流溯金水清純之初氣道在掌握而鬼神莫能窺身在樊籠而死生莫能累人道固近而仙道豈遠奈何智者過之愚者不及不有其傳罔臻妙義予晚歲用順修之道得生三子不敢自私因著廣嗣要語少指迷途近有數刻本附方者為錦衣萬君鹿園所刊附經者為州守劉君仲衡所刻惜其流布未洽用捐微祿倩工重梓以為廣傳之云爾總論蓋由而觀之天不無日月星辰地不無樹木黍稷人不無生育物不無胎卵濕化要知得其養耳得其養則磽者以肥瘠者以沃草木何懼乎不蕃黍稷何懼乎不秀夫人亦由是也苟形質強壯而嗜欲無節久之不免虛衰賦稟怯薄而攝養有道終焉亦能完實不特少健而老衰早壯而晚憊滋培保護之間固可以挽秋冬而復春夏也昔者名醫羅天益云戊午春桃李始花雨雪厚寸叟令人擊樹墜雪焚草於下是年果結蕭然而此園結果甚多然則天地之氣尚可以法轉移於人之身豈無所用其力焉愚乃不慚愚昧積以平時縉紳方士之說質諸古今名家論議著為調理精血直指其源男女服藥三論陰陽虛實四圖合用方法三十五道附錄經驗秘方二十二道號曰廣嗣要語精切曉明纖芥不隱信此以行將見天下無不可父之男無不可母之女而螽斯之慶而子孫蕃茂矣調理精血要論求嗣之道在於男精女血充實而無病也苟有病焉必資明醫論症調之夫精者血也水也陰也蓋以有形言之也有形而能射者則又為氣為血為陽所使然也論曰孤陽不生獨陰不成無形則陽無所附無陰則陽無所依是精兼氣血兼水火兼陰陽總屬腎與命門二脈以沉靜為平若見命門脈細或絕陽事疾弱是為陽虛法宜補陽若見命門脈洪大鼓擊陽事堅舉是為相火妄動法宜滋陰制火啟玄子曰壯水之主以制陽光若見腎脈洪大或遺精尿血是為陰虛法宜補陰若見腎脈虛微太甚別無相火為病法宜陰陽雙補又如經者血也水也陰也假如火色而為赤也隨氣而行依陽以運亦若精之兼氣血兼陰陽兼水火者也其候以一月為期上應月之盈虧故名曰月水應其期則平失其期則病先其期者血熱也過其期者血虛也過期而色淡者有痰也或曰血虛也經行而成塊者氣凝之也或曰風冷乘之也將行而作疼者氣之滯也行後而作痛者氣血俱虛也經水紫黑者氣血俱熱也雖然又當察其時寒暖脈之遲數症之冷熱平而調之以復常候不可一途而取夫男精女血既充別無他疾惟守投虛之法是為知要直指真元論結胎者男女精血也男屬陽而象乾乾道資始女屬陰而象坤坤道始生陽主動故能施發陰主靜故能承受夫動靜相參陰陽相會必有其時乃成胎孕凡經淨一三五日新血未盛精勝其血血開裹精精入為骨男胎成矣二四六日新血漸長血勝其精精開裹血血入本㞐女胎成矣七日至十日鮮有成者縱皆女胎欲求子者全在經淨一三五日以里交合如俯首拾芥萬舉萬當斯時男女無暴怒無醉飽毋食炙煿辛熱毋用他術助長陰陽和平精血調暢交而必孕孕而必育育而必子堅壯強壽至真切要在此數語受娠之後宜令鎮靜血氣安和則胎孕長養又宜內遠七情外薄五味大冷大熱之物皆在所忌苟無胎痛漏血瀉痢及風寒外邪不可輕易服藥亦不得交合陰陽觸動欲火未產則胎不常既產則胎毒不已降生之後攝養一如胎前蓋母食熱則乳熱母食寒則乳寒母食膏粱野味之物則乳毒有此數者子受其害矣求嗣之道誠不出此然源頭一節尤當研究男子十六而精必通必三十而娶女子十四而天癸至必二十而嫁皆欲陰陽二氣充實或精未通而御女經始至而近男未充而傷未實而動根本既薄枝葉必衰嗣息豈能蕃衍先儒言寡欲多男子蓋寡欲則不妄交合積氣儲精待時而動故能有子予為不在於此為寡欲凡心有所動既是欲心主血而藏神屬手少陰腎主精而藏志屬足少陰心神外馳則腎志因亂其於交會之際殊無靜一清寧之氣所泄之物同歸腐濁而已安能發育長養於其間哉書曰人心惟危道心惟微夫能精一道心俾常為一身之主則邪思妄念自爾退聽欲寡而神益完不惟多子抑且多壽養身莫善於寡欲正此謂也男女服藥論男子以陽用事從乎火而主動動則諸陽生女子以陰用事從乎水而主靜靜則眾陰乘故治男子毋過溫熱以助其陽治女子毋過寒涼以益其陰古人以黃柏知母之藥每用於男子而乾薑艾葉之劑恆絕於婦人男女陰陽自然之體固有不得而同者至於七情內傷六淫外侵發為諸症治寒以熱制熱以寒隨病推移安能執此但男女嗣續稍遲雖無疾病當加調護男子陽動之體惟慮合而易失未獲中其肯綮女子陰靜之質多若交而弗孕不能逆其生成由是培養之術若不可廢在男子則用思仙丹丸固其陰以為持久之計在女子則用啟榮丸鼓作微陽以為發育之基竊觀古今種子之方不偏於寒即偏於熱務張其功以矜世不析其理以示人往往服之反致求全之毀故述二方以為世之求嗣者助云實陽能入虛陰之圖成胎實陽能入虛陰為男子陽精充實適值女人經後血海虛靜子宮正開與之交合是謂投虛一舉而成胎矣經盡一日交會成男二日成女三日成男四日成女五日成男六日成女取奇陽偶陰之義過六日無用矣大抵前三日新血未盛精勝其血血開裹精必成男胎後三日新血漸長血勝其精精開裹血多成女胎凡交會必半夜生氣時有子皆男而壽實陰不能受陽之圖妄施實陰不能受陽為女人經盡六日之後新血方盛血海充滿若與交合以實投實多不成胎又有婦人素稟怯弱雖經後旬日血海未滿亦覆成胎然皆女胎亦血勝其精之故也微陽不能射陰之圖治男微陽不能射陰為男子陽精微薄雖逢女人血海虛靜之日流而不射多不成胎蓋因平日嗜欲不節施泄太多所致法宜補益精元並用功夫存養毋令妄動候陽精充實方按投虛之法一舉而成胎矣兩尺脈大而數小便常赤未交易興既交易泄或自遺夢遺真精不固治在補陰兩尺脈微而遲小便常清陽事不舉勉力入房未覺先痿或所泄清淡微薄治在補陽弱陰不能攝陽之圖治女弱陰不能攝陽謂女人陰血衰弱雖投真陽強壯之精不能攝入子宮是以交而不孕孕而不育或因病後經後產後調理失宜勞動骨節虧損陰血所致治宜調經養血之要調元陽虛右尺命門脈細微精清服還少丹巨勝子丸陰虛左尺腎脈洪大或數遺精尿血淋澀等症服丹溪大補陰丸加味虎潛丸相火妄動陽事數舉右尺命門脈洪大此為水不勝火與陰虛同治法補陰則相火自降也陰陽俱虛兩尺脈微弱無力真精薄服八味丸補天丸調經經先期者血熱服四物湯加芩連之類過期者血虛四物湯加參耆白朮陳皮之類過期而色淡者有痰二陳加芎歸紫黑色及有塊血熱四物加芩連香附之類行後而作疼者氣血俱虛服八物珍湯經行不止者四物加阿膠荊芥穗之類安胎胎痛乃血少四物加童便制香附共為末紫蘇湯調下有所激觸而疼者芎歸湯探之胎動屬火四物加條芩之類胎動不安及下血用集驗方秦艽丸湯胎動不安或因房室不節有所觸動四物加膠艾條芩白朮之類妊娠惡阻肥人有痰瘦人有熱胃氣不安用人參橘皮湯保生湯集驗青竹湯懷胎不問幾個月日但覺胎氣不安腰腹微痛飲食不美用安胎飲便產妊娠七八個月恐胎氣展大難產宜服束胎丸妊娠八九個月肥味膏粱之人胎氣壅隘宜服枳殼散間二三日一服或達生產散救生散臨月用神寢丸三合濟生湯難產用催生丹遇仙丹如聖膏豬肝蜜酒法胎衣不下或血乾或血冷凝澀宜服奪命丹牛膝湯或前方如聖膏又方用紅花一兩酒煮濃汁服之又法令產婦自銜髮尾在口嘔噦即下交會宜忌日宜旺相日春甲乙寅卯夏丙丁己午秋庚辛申酉冬壬癸子亥宜忌日晦朔弦望大風大雨虹霓雷電雲霧昏暝日月薄蝕三光之下及秋冬丙丁日轉女成男法受妊之後用弓弦一條絳囊盛帶婦人左臂近肩垂繫腰下滿百日去之又用雄黃一兩絳囊盛帶或用左邊斧一把置孕婦床頭仍置床下勿令人知雞抱卵時置斧窠下皆雄雞也以上諸法或用其一可也附方秘授金鎖思仙丹治男子嗜欲過多精氣不固澀以去脫之劑蓮花蕊十兩暖無毒鎮心益顏色忌地黃蒜石蓮子十兩味甘平溫無毒經秋正黑沉水者是也本功安心正渴治腰疼泄精入藥內去心取粉雞頭十兩味甘平無毒益精氣強志用則取其實搗爛曬乾再搗篩取粉上用金櫻子三斤取霜後半黃者木臼中轉杵卻刺勿損劈為兩片去子水淘淨搗爛入大鍋以水煎不絕火約水煎半取出瀝過重煎如稀餳市肆乾者焙之用水浸軟再煎令如法入前三味末和丸桐子大每服三十丸空心鹽湯服一月見效即不走泄候婦人月信住取車前子一合煎水空心服之一交成孕依方服至多日精神強壯能成地仙忌時葵菜車前子按本草金櫻子味酸澀平無毒療脾泄澀精氣精氣滑脫者服之自固或言其性澀乃因無是病而用是藥且無配製而作單煎服籲澀可去脫十劑之法良工不能更其道也夫雞頭實味甘平無毒補中益精石蓮子味甘寒無毒安心神養氣力治泄精蓮花蕊無毒鎮心益顏色服餌家取雞頭實和熬金櫻子煎和丸補下益人名水陸丹仙方取雞頭實並蓮實合餌養之能駐年昔人得其一二功效若此思仙合眾妙而有之信可尚矣玉鑰啟榮丸治女人無病經事調勻容顏不損但久無胎孕婦人者眾陰之所集常與溫居今失所養則子宮有陰無陽不能生育用此丸平調氣血鼓作微陽生育之要藥也人參白朮甘草當歸川芎熟地沒藥藁本白薇白芷茯苓牡丹皮白芍藥赤石脂玄胡索各兩上藥將石脂沒藥另研外其餘用醇酒浸三日焙曬乾為細末足十五兩又用香附子去皮毛水醋浸三日炒乾為細末亦十五兩將前共十六味用重羅篩極細末煉蜜丸桐子大瓷器中封固每服五十丸空心溫酒或白滾水送下以乾物壓之待月事後受妊為度還少丹治右尺命脈微細陽事痿弱精氣不足陽虛之症山藥牛膝去蘆酒浸遠志去心巴戟去心山茱萸去核五味蓯蓉杜仲炒去絲茴香白茯苓各一兩枸杞熟地各一兩五錢菖蒲楮實子各一兩上為末用棗泥煉和丸如桐子大每服三五十丸溫酒或鹽湯送下食蒯艮一日用三服巨勝子丸治右尺命門脈虛微欲脫陽痿不舉陽脫之症熟地黃生地黃何首烏川牛膝天門冬肉蓯蓉枸杞子菟絲子巨勝子白茯苓柏子仁酸棗仁破故紙炒巴戟天去心北五味覆盆子懷山藥楮實子天雄續斷各一兩雞頭肉蓮花蕊韭菜子胡蘆巴真川椒各五分木香二錢五分上為末煉蜜丸桐子大每服七十丸虛甚者百丸空心溫酒下大補陰丸治左尺腎脈洪大或數遺精尿血壯陰之要藥也黃柏鹽水炒知母鹽水炒各四兩熟地黃龜板去旁酥炙各六兩上為末煉蜜和豬脊髓丸桐子大每服七十丸空心鹽湯送下補陰丸治左尺脈洪大或數精元不固補陰制血之藥也黃柏鹽水酒炒半斤知母同上制熟地各三兩白芍炒川牛膝酒洗虎脛骨一兩酒浸酥炙陳皮瑣陽當歸龜板各四兩酒浸酥炙上為末酒煮羊肉丸桐子大每服五十丸空心鹽湯送下各加乾薑半兩加味虎潛丸治左尺腎脈虛數精神短少腰肢無力補腎養血之要劑也人參黃耆蜜水炒白芍炒黃柏酒炒當歸酒洗山藥各一兩瑣陽酥炙枸杞龜板酒洗酥炙龜虎脛同上炙菟絲子酒洗炒各五兩破故紙杜仲鹽水炒斷絲五味子牛膝酒洗各七錢五分熟地四兩上為末煉蜜和豬脊髓丸桐子大每服百丸空心溫酒或鹽湯送下八味丸治兩尺脈微弱陰陽俱虛雙補之劑紫河車一具即胞衣男用女胎女用男胎俱用頭胎為佳若不能有即壯婦人者亦可黃藥酒炒龜板炙各三兩杜仲酥炙牛膝酒浸各二兩陳皮一兩加乾薑半兩夏加五味子一兩以上共為細末將紫河車水洗淨布絞乾用酒煅爛入諸藥末共搗勻焙炒再為末酒和丸桐子大每服百丸空心沸湯或溫酒下四物湯治女人血分或寒或熱經事前後不調或多或少以致崩帶血塊積諸症用此加減當歸川芎芍藥熟地各等分水煎服芎歸湯一名佛手散補血活血生新去敗產前胎後皆可服用當歸川芎二味各等份每服四五錢入酒一杯煎欲干加水一杯再煎二三滾去渣溫服安胎飲治婦人懷妊不問幾個月但覺胎氣不安腰腹微痛飲食不美用此湯服之白朮白芍熟地當歸各一錢甘草縮砂紫蘇各三分人參川芎黃芩各五分上藥作一劑加生薑一片水煎溫服集驗方治婦人胎動不安及下血服之可愈艾葉阿膠川芎當歸各三錢甘草一錢上藥將阿膠存外用水四茶杯入藥內同煎至二杯去渣納阿膠於內煎令化分三服一日用完秦艽湯治症同前秦艽艾葉醋炒阿膠蛤粉炒各等分為粗末每服五錢水二杯元米百粒煎至一杯去渣溫服人參橘皮湯治妊娠噁心阻食和中安胃之藥也白朮麥門冬去心橘紅人參各一兩白茯苓二兩厚朴薑汁炒二兩甘草三錢上為粗末每服四錢水杯半用淡竹茹彈子大一枚生薑三片煎至七分去楂澄清空心溫服保生湯治婦人惡阻養胃調氣之劑人參八分甘草五分白朮一錢橘紅一錢二分烏藥一錢香附一錢上藥用水一鍾生薑五片煎七分去楂不拘時溫服嘔吐加丁香同煎服集驗青竹茹湯治婦人惡阻清痰止嘔之藥竹茹彈子大一枚橘紅一錢五分生薑二錢茯苓一錢五分半夏二錢湯泡七次上藥用水二鍾煎七分去查溫服忌食羊肉餳酢等物束胎丸治婦人懷孕七八個月恐胎轉大難產用此藥扶助母氣束緊兒胎白朮陳皮各一兩茯苓一錢五分條芩酒炒夏用一兩春秋用七錢五分冬用五錢上為末粥和丸桐子大每服五六十丸食前白湯米飲送下枳殼散治婦人懷孕八九個月稟質肥厚胎氣壅隘此必寬和母氣令兒易產商州枳殼五兩麩炒赤粉草一兩炙香附一兩炒上為末每服二分空心滾水調服一日服三劑一方加元米炒同為末白湯點服令兒易產初生微黑百日肥白此為古方之妙若孕婦稍弱恐胎寒腹痛胎弱多驚內可加當歸木香各五分則陽不致強陰不致弱二氣調和有益於胎產達生散治婦人懷孕八九個月服此以扶正氣散滯氣妊婦稍虛者尤為更妙大腹皮薑汁煮白朮白芍當歸各一錢甘草一分五釐陳皮人參紫蘇莖葉各五分上藥作一劑水煎服夏加黃芩或黃連五味子春加川芎防風秋加澤瀉冬加縮砂或通加枳殼縮砂胎動加苧根金銀花氣上加紫蘇地黃性急加柴胡多怒加黃芩食少加縮砂神麯渴加麥門冬黃芩能食加黃楊腦有痰加半夏黃芩隨症加之尤妙救生散治孕婦稟受瘦怯不宜服枳殼散破氣之藥此方安胎益氣令兒易產人參神麯炒麥芽炒訶子煨去核白朮麩炒橘紅炒上藥各等分為細末每服三錢水一杯煎七分空心溫服議云謂今八月合進瘦胎易產之藥若枳殼散非為不是但妊婦肥實者可用也若本瘦怯不宜服此藥惟救生散安胎益氣有子緊小無病易產最為穩當神寢丸治孕婦臨產月日破滯氣瘦胎易產通明乳香五錢另研商州枳殼一兩麩炒上為末煉蜜丸桐子大空心溫酒或米飲服二三十丸臨月用之瘦胎易產極妙三合濟生湯以枳殼芎歸達生三方抽其精粹合成此湯治臨產艱難雖一二日不下者服之自然易便枳殼三錢麩炒香附一錢五分炒粉草七分川芎一錢當歸三錢蘇葉八分大腹皮薑汁洗一錢五分上藥用水二鍾煎至一半待腰腹痛甚服之即產催生丸治孕婦生理不順產育艱難或橫或逆大有神效宜用天醫月日合十二月兔腦去膜研如泥通明乳香一錢研細母丁香一錢為末麝香一錢研上以乳麝丁香拌勻入兔腦髓為丸雞豆大陰乾油紙密封固臨產服一丸溫水送下立產男左女右手握出神效催生不傳遇仙方治婦人坐草艱難蓖麻子十四個去殼硃砂雄黃各一錢五分蛇蛻一尺煅上為細末粥和丸彈子大臨產時先用川楝湯淋洗臍下納藥一丸臍中仍以蠟紙數重覆藥上軟帛拴系產則急取藥去一丸可用三次如聖膏治同前用蓖麻子七粒去殼細研成膏塗產婦腳心如產急急洗去遲則腸出卻以此膏塗頂上腸自縮入又方用蓖麻子百粒加雄黃一錢同研用如前法豬肝蜜酒法治婦人胞水早行胎澀不下豬肝一斤白蜜一斤醇酒一斤上三味共煎至二斤分作二三服如不能服者隨多少緩緩服之即下奪命丹治婦人血冷凝澀胎衣不下大黃四錢漓醋煎膏黑附子二錢泡去皮丹皮四錢乾漆炒煙盡上為末以大黃膏同雞子白搗成丸桐子大酒溫急吞五七丸如未下用後方牛膝湯治婦人生產不順用此方滑利水道令兒易下牛膝一錢酒洗瞿麥一錢滑石二錢當歸酒洗木通各一錢葵子一錢二分五釐如無用黃蜀葵花上藥分三服水二鍾煎八分溫服須宜先修合預備為上補附廣嗣方五子衍宗丸凡男子服此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自能平和舊稱古今第一種子方人能世服此藥子孫蕃衍嘉靖丁亥於廣信鄭中丞府得之張神仙四世予及數人用之甚驗五味子一兩去枝梗搗曬乾枸杞子九兩菟絲子七兩蒸搗餅覆盆子五兩淘去花葉曬乾車前子三兩微炒揚去土上藥宜擇道地精新者曬焙乾各為細末稱定煉蜜丸桐子大每服七十丸空心鹽湯送下冬月溫酒服合藥日春取丙丁己午日夏取戊己辰戌日秋取壬癸子亥日冬取甲乙寅卯日須用上旬晴霽之日忌雞犬異類所見百子建中丸凡女服此藥調經養血安胎順氣不問胎前產後月事參差有餘不足諸症悉皆治之更益胎嗣此方太僕鮑璧所驗其妻三十而不生育忽經事不至十月腹鼓大面無病容皆謂有妊一日忽產穢物盈桶視之皆敗痰積血後服此丸不一年生一子予曰常以此二方濟人無不效者真阿膠二兩蛤粉炒成珠蘄艾葉二兩去筋膜醋煮乾當歸二兩壯大者酒洗去蘆川芎二兩去蘆熟地二兩白芍二兩香附子十二兩赤心者佳去毛杵成米醋各半浸一夜曬上藥宜擇道地除熟地另研稱定各為細末煉蜜丸桐子大每服八十丸空心少醋點沸湯下內寒者溫酒下此二方不熱不寒不補不瀉藥物近易性味平和明效大驗詳載本草予中年得此方信心服餌連生三子後轉施多人罔有不應太僕史室久不得育服百子建中丸兩月受妊後生一子但修合日時俱用上旬生氣之日並有吉星照曜如此無不效驗神效黑附方治婦人久不生育經事不調及墜胎者服之無不立效香附子一斤要北方香附米去毛分作四分一分好酒浸一分米泔水浸一分童便浸一分醋浸各浸一日夜艾綿四兩要潔淨無細梗及灰塵者用醋二大碗同香附一處煮乾石臼內約杵三千下以爛為度捻作餅子錢樣大用新瓦灰火焙乾搗成末白茯苓一兩去皮淨當歸一兩去皮淨酒浸一夜人參一兩川芎一兩去土淨大者大熟地一兩酒浸去土又用酒浸一夜飯上蒸木香五錢要廣南香上等徽墨一兩火煅醋淬上藥九味各為細末醋和丸桐子大每服五十丸空心陳酒送下此方是聞人道長所傳何首烏丸喬白岩服何首烏三斤用銅刀或竹刀切片牛膝一斤去苗銼上藥用黑豆一斗淘洗淨用甑一口先以豆鋪甑底後鋪何首烏又鋪豆一層再鋪牛膝重重鋪好安釜上蒸之令豆熟為度去豆取藥曬乾又換豆蒸之如此三次去豆取藥為末蒸棗肉為丸桐子大每服五十丸食前溫酒服之忌食蘿蔔蔥蒜何首烏乾者米泔水浸軟切之又方蕭東之傳云蔣敬所服此何首烏雄雌各半斤銅刀去粗皮為片米泔水浸夏一宿春秋二宿冬三宿取出曬乾為末無火病者以棗肉為丸或蜜丸清晨鹽湯送下或酒下尤佳本草服何首烏用茯苓煎湯勝似鹽湯上二方楊後江服此連孕及人傳服者皆驗延年益嗣丸男服生地黃酒浸一宿曬乾熟地酒洗淨曬乾地骨皮各五兩酒洗曬乾人參三錢茯苓酒浸曬乾天門冬酒浸三時去心曬乾麥門冬同天門冬煮一樣各五兩上用何首烏半斤鮮者用竹刀刮去皮切片如干者米泔水浸軟刮去皮亦切片置砂鍋內下用烏羊肉一斤烏豆三合量著水用上加蓖放此藥上蒸一二時取出曬乾共為細末煉蜜為丸桐子大每服三五十丸清晨溫酒送下此方崇德縣韓主簿傳加味益母丸女服益母草半斤川芎赤芍當歸廣木香各一兩上為末蜜丸桐子大每服五十丸用好酒或童便酒下其妙非常百日可孕上二方余夫婦同服有驗四制香附方丸香附米一斤用酒醋鹽湯童便各浸三日瀝乾炒當歸四兩酒浸川芎四兩白芍四兩酒炒白朮二兩陳皮二兩熟地四兩薑汁炒澤蘭葉二兩黃柏二兩酒炒甘草一兩酒炒上為末酒和丸每服七十九空心白滾水下此方調經養血順氣健脾如信服此有妊琥珀調經丸治婦人無子能經正香附子一斤童便好醋各浸半斤浸七日蘄艾去枝梗者四兩入香附子內攪勻每加好醋五碗入砂鍋內同煎干為度曬乾為末另作後藥當歸二兩酒洗川芎二兩熟地二兩酒蒸另研入前藥芍藥二兩煨琥珀一兩另研上為細末共一處搗研細醋和丸桐子大每服百丸空心艾醋湯送下濟陰丸女服赤芍四兩去蘆川芎同上生地黃四兩去苗當歸四兩去蘆好艾一斤去梗香附一斤上分為四份用醋童便鹽水酒各浸一夜俱浸一宿加醋三斤拌勻以砂鍋煎盡為度取出曬乾為末醋和丸桐子大一日三餐飯前每服五六十丸令人體壯經調有孕服久諸症不作雛雞丸用頭窠烏骨雞雌雄各一隻置放一處不可與群雞相混候生卵時將初生卵記放待生足將初生卵頂上開一竅用硃砂三錢當歸芍藥川芎熟地各二錢為細末將卵黃傾出和藥末仍入殼內以厚紙封之眾卵內覆之待群雞生將藥卵出殼以蜜丸之空心好酒服三四十丸此甚見效藥完即有孕此方宣府鎮守總兵馬儀都督所傳煮附丸專治婦人心懷鬱結經不能調故不得孕此方甚效不須更服他藥用川附子不拘多少去毛皮米泔水浸一宿曬乾用好醋砂鍋內旋醋添煮透取出焙乾為末仍用醋和丸桐子大每服五十七十丸服久即經調有孕溫臍種子法五靈脂香白芷青鹽各二錢麝香一分上為末以蕎麥麵湯和搓成條子圈於臍上以前藥入於其中用艾灸之但臍內微溫即好不過二三度兜肚方白檀香一兩靈陵香五錢馬蹄香五錢香白芷五錢馬兜鈴五錢羚羊角一兩木鱉八錢甘松五錢升麻五錢丁香七錢血竭五錢麝香九分上藥分作三個兜肚內用蘄艾絮綿俱裝白綾兜肚內其法初帶者三日後一解至第五日復帶專治痞積遺精白濁婦人赤白帶下及經脈不調久不受孕者皆可第五日帶後至一月後即能常帶惟孕婦不可用益母草丸上單用益母草一味為末忌用鐵器煉蜜丸彈子大每服一丸久服令人有子此先祖蘭窗公所常施而有驗者其婦人胎前產後諸疾治無不效服法備載於積善堂中妊婦五忌崑山顧狀元刊施一勿睡熱炕南方火箱亦同二勿飲燒酒切不可飲黃酒有藥亦不宜多飲三勿食煎炙煿厚味之物四勿食蔥蒜韭薤胡椒茱萸五勿於星月下仰臥及當風處洗浴坐臥小兒五宜一凡小兒初生宜先煎濃黃連甘草湯急用軟絹或絲綿包指蘸藥摳出口中惡血如或不及即以藥湯灌之待吐出惡沫方與乳吃令出痘稀少二凡小兒初生三五月宜繃縛令臥勿豎頭抱出免致驚癇三凡小兒飲乳與食相遠不宜一時混吃令兒生疳癖積四凡小兒初生宜用老年人舊服做衣與小兒穿真氣相滋令兒有壽富貴之家不宜用綾緞之衣令兒折福五凡小兒四五月止與乳吃六個月後方與稀粥哺之周歲以前不宜食葷物並生冷之物令兒多疾待至二三歲後臟腑稍壯才與葷物延生第一方鎮江錢醫官傳小兒初生臍帶落後取置新瓦上用炭火四圍炙之待至煙盡放地上用盞蓋之存性研為末先取硃砂透明者研極細末水飛過臍帶若有五分重加硃砂二分五釐用生地歸身煎濃汁三殼調和三味抹兒上齶間及乳頭上一日之內兒食乳盡次日大便遺下穢汙濁垢之物終身永無瘡疾及諸症此永無外疾真妙法也神功消毒保嬰丹凡小兒未出痘疹者每遇交春分秋分時服一丸其痘毒能漸消化若只服三次者亦得減少若服三年六次其毒盡能消化必保無虞此方神秘本不欲輕傳但慈幼之心自不能已願與四方好事君子共之纏豆藤一兩五錢八月中收青豆梗上纏細紅絲者用之採取陰乾黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢五分荊芥五錢防風五錢赤芍藥五錢生地黃一兩川獨活五錢甘草五錢當歸五錢連翹七錢五分苦絲瓜二斤五寸長者隔年經霜者妙燒灰存性黃連五錢桔梗五錢辰砂水飛另研牛蒡子一兩紙炒過上各為細末和勻淨砂糖拌丸李核大每服一丸煎濃甘草湯化下其藥須用精料遇春分秋分或正月十五日七月十五日修合務在精誠忌婦女雞犬見合時向太陽祝藥曰神仙真藥修合自然嬰兒吞服天地齊年吾奉太上老君急急如律令敕一氣七遍治小兒口齶牙根生白點名馬牙不能食乳此比鵝口不同少緩即不能救多致夭殤急用針縛箸上將白點挑破出血用陳京墨磨薄荷湯以手指拈母油發蘸墨遍口齶擦之勿令食乳候睡一時醒方與乳後再擦之即愈牛黃抱龍丸此方治一切急慢驚風及風熱風癱屢服效驗用薄荷煎湯磨服一丸兒小分三四次服膽星八分雄黃一錢五分辰砂一錢二分殭蠶三錢鉤藤一兩五錢人參一錢五分茯苓一錢五分天竺黃二錢五分上藥共為細末加牛黃二分麝香五分同研細末入前藥又研勻將甘草四兩銼碎用水二大碗煎成一盞丸如芡實大金箔為衣陰乾藏入蠟丸中勿泄氣每令見微火為妙上各附方乃自驗及人服屢驗皆秘方也茲前闡錄以廣前方之所未備蓋人之稟養不齊病亦隨異故方各有宜在人擇而用之則無不效矣嘉靖丙申九日鹿園居士萬表識
